<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="application-name" content="Haku" />
  <meta name="apple-mobile-web-app-title" content="Haku" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Zen homepage" />
  <meta name="theme-color" content="#e3e3e3" />
  <meta name="color-scheme" content="light" />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Haku" />
  <meta property="og:title" content="Haku" />
  <meta property="og:description" content="Zen homepage" />
  <meta property="og:url" content="https://haku.jeme.app/" />
  <meta property="og:image" content="https://haku.jeme.app/favicon.png" />
  <meta property="og:image:secure_url" content="https://haku.jeme.app/favicon.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Haku" />
  <meta name="twitter:description" content="Zen homepage" />
  <meta name="twitter:image" content="https://haku.jeme.app/favicon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <title>Haku</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <button class="settings-button" id="openSettings" type="button" aria-label="Open settings" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
      <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
      <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2.05 2.05 0 0 1-2.9 2.9l-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2.05 2.05 0 0 1-4.1 0v-.09A1.7 1.7 0 0 0 8.8 19.35a1.7 1.7 0 0 0-1.88.34l-.06.06a2.05 2.05 0 0 1-2.9-2.9l.06-.06A1.7 1.7 0 0 0 4.36 15a1.7 1.7 0 0 0-1.56-1.03H2.7a2.05 2.05 0 0 1 0-4.1h.1a1.7 1.7 0 0 0 1.56-1.03 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2.05 2.05 0 0 1 2.9-2.9l.06.06A1.7 1.7 0 0 0 8.8 4.4a1.7 1.7 0 0 0 1.03-1.56V2.75a2.05 2.05 0 0 1 4.1 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06a2.05 2.05 0 0 1 2.9 2.9l-.06.06a1.7 1.7 0 0 0-.34 1.88 1.7 1.7 0 0 0 1.56 1.03h.09a2.05 2.05 0 0 1 0 4.1h-.09A1.7 1.7 0 0 0 19.4 15Z" />
    </svg>
  </button>

  <main class="shell">
    <section class="home" aria-label="Haku">
      <div class="mark">Haku</div>

      <div class="clock-zone" id="clockZone"></div>

      <section class="search-card">
        <form class="search-form" id="searchForm">
          <div class="engine-picker" id="enginePicker">
            <button class="engine-picker-button" id="enginePickerButton" type="button" aria-label="Choose search engine" aria-haspopup="listbox" aria-expanded="false">
              <img id="enginePickerIcon" src="assets/google.svg" alt="" />
            </button>
            <div class="engine-menu" id="engineMenu" role="listbox" aria-label="Search engines" hidden></div>
          </div>
          <input class="search-input" id="searchInput" type="search" placeholder="Search" autocomplete="off" spellcheck="false" aria-autocomplete="list" aria-controls="suggestionMenu" aria-expanded="false" autofocus />
          <button class="submit-button" type="submit" aria-label="Search" title="Search">
            <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M5 12h14" />
              <path d="m13 6 6 6-6 6" />
            </svg>
          </button>
        </form>
        <div class="suggestion-menu" id="suggestionMenu" role="listbox" aria-label="Search suggestions" hidden></div>
      </section>

      <div class="quiet-row" id="weatherRow">
        <div class="weather" id="weather" aria-live="polite"></div>
      </div>

      <div class="quiet-row">
        <nav class="links" id="links" aria-label="Links"></nav>
      </div>
    </section>
  </main>

  <dialog id="settingsDialog" aria-labelledby="settingsTitle">
    <form method="dialog" class="settings">
      <header class="settings-header">
        <h2 class="settings-title" id="settingsTitle">Settings</h2>
        <button class="icon-button" value="close" aria-label="Close settings" title="Close" type="submit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </header>

      <div class="settings-body">
        <section class="section">
          <h3 class="section-title">Appearance</h3>
          <div class="field-grid">
            <label class="field">
              Theme
              <select id="themeMode">
                <option value="auto">Auto</option>
                <option value="ink">Ink</option>
                <option value="paper">Paper</option>
                <option value="stone">Stone</option>
                <option value="matcha">Matcha</option>
                <option value="dawn">Dawn</option>
                <option value="contrast">High contrast</option>
              </select>
            </label>
          </div>
        </section>

        <section class="section">
          <h3 class="section-title">Clock</h3>
          <div class="field-grid">
            <label class="field">
              Mode
              <select id="clockMode">
                <option value="none">None</option>
                <option value="digital">Digital</option>
                <option value="analog">Manual</option>
              </select>
            </label>
            <label class="field">
              Time format
              <select id="timeFormat">
                <option value="24">24 hour</option>
                <option value="12">12 hour</option>
              </select>
            </label>
            <label class="field">
              Date format
              <select id="dateFormat">
                <option value="short-weekday">Mon, Mar 17</option>
                <option value="long-weekday">Monday, March 17</option>
                <option value="numeric-us">03/17/2003</option>
                <option value="numeric-eu">17/03/2003</option>
                <option value="numeric-dotted">17.3.2003</option>
                <option value="iso">2003-03-17</option>
              </select>
            </label>
          </div>
        </section>

        <section class="section">
          <h3 class="section-title">Search</h3>
          <div class="field-grid">
            <label class="field">
              Suggestions
              <select id="suggestionsEnabled">
                <option value="true">Show suggestions</option>
                <option value="false">Hide suggestions</option>
              </select>
            </label>
            <label class="field">
              Suggestion source
              <select id="suggestionSource">
                <option value="general">General web</option>
                <option value="current">Current engine</option>
              </select>
            </label>
            <label class="field">
              Search history
              <select id="searchHistoryEnabled">
                <option value="false">Do not save</option>
                <option value="true">Save locally</option>
              </select>
            </label>
          </div>
          <div class="engine-settings" id="engineSettings"></div>
          <div class="link-list" id="customEngineList"></div>
          <div class="link-row custom-engine-row">
            <input id="customEngineName" type="text" placeholder="Name" aria-label="Custom engine name" />
            <input id="customEngineUrl" type="url" placeholder="https://example.com/search?q={query}" aria-label="Custom engine URL template" />
            <input id="customEnginePrefix" type="text" placeholder="/prefix" aria-label="Custom engine slash prefix" />
            <input id="customEngineShortcut" type="text" maxlength="1" placeholder="key" aria-label="Custom engine shortcut" />
            <button class="text-button" id="addCustomEngine" type="button">Add</button>
          </div>
          <div class="field-error" id="customEngineError" role="status" aria-live="polite"></div>
        </section>

        <section class="section">
          <h3 class="section-title">Weather</h3>
          <div class="field-grid">
            <label class="field">
              Show
              <select id="weatherEnabled">
                <option value="true">Visible</option>
                <option value="false">Hidden</option>
              </select>
            </label>
            <label class="field">
              City
              <input id="weatherCity" type="text" autocomplete="address-level2" placeholder="City" />
            </label>
            <label class="field">
              Units
              <select id="weatherUnits">
                <option value="celsius">Celsius</option>
                <option value="fahrenheit">Fahrenheit</option>
              </select>
            </label>
          </div>
        </section>

        <section class="section">
          <h3 class="section-title">Shortcuts</h3>
          <div class="shortcut-list" id="shortcutList"></div>
        </section>

        <section class="section">
          <h3 class="section-title">Links</h3>
          <div class="link-list" id="linkList"></div>
          <button class="text-button" id="addLink" type="button">Add link</button>
        </section>
      </div>

      <footer class="settings-footer">
        <button class="text-button danger" id="resetSettings" type="button">Reset</button>
        <button class="text-button" value="close" type="submit">Done</button>
      </footer>
    </form>
  </dialog>

  <script src="app.js" defer></script>
</body>
</html>
